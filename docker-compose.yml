version: '3.8'
services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: odontoclub
    ports:
      - "5433:5432"
    volumes:
      - prisma-data:/var/lib/postgresql/data

volumes:
  prisma-data:
